<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meetingprotokoll-Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 960px;
    margin: 0 auto 1.5rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  header h1 { font-size: 1.4rem; font-weight: 600; color: #f8fafc; }

  .card {
    background: #1e2130;
    border: 1px solid #2d3348;
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 960px;
    margin: 0 auto 1.5rem;
  }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
  .tab {
    padding: 0.5rem 1.25rem;
    border-radius: 8px;
    border: 1px solid #2d3348;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.15s;
  }
  .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  #file-input { display: none; }
  .file-label {
    display: block;
    padding: 0.6rem 1rem;
    border: 1px dashed #4b5563;
    border-radius: 8px;
    cursor: pointer;
    color: #94a3b8;
    font-size: 0.9rem;
    text-align: center;
    transition: border-color 0.15s;
    margin-bottom: 0.5rem;
  }
  .file-label:hover { border-color: #3b82f6; color: #e2e8f0; }
  #file-name { font-size: 0.85rem; color: #64748b; margin-bottom: 0.75rem; }

  .meta-row {
    display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .meta-input {
    flex: 1; min-width: 150px;
    padding: 0.45rem 0.75rem; border-radius: 8px;
    border: 1px solid #2d3348; background: #0f1117; color: #e2e8f0;
    font-size: 0.88rem; outline: none;
  }
  .meta-input:focus { border-color: #3b82f6; }
  .meta-input::placeholder { color: #4b5563; }

  .record-row { display: flex; align-items: center; gap: 1rem; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #ef4444; display: none; }
  .dot.pulse { display: block; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  #record-timer { font-size: 0.9rem; color: #94a3b8; font-variant-numeric: tabular-nums; }

  .btn {
    padding: 0.5rem 1.25rem; border-radius: 8px; border: none;
    cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: opacity .15s, background .15s;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:not(:disabled):hover { background: #2563eb; }
  .btn-danger  { background: #ef4444; color: #fff; }
  .btn-danger:not(:disabled):hover  { background: #dc2626; }
  .btn-ghost   { background: #2d3348; color: #e2e8f0; }
  .btn-ghost:not(:disabled):hover   { background: #374151; }

  .progress-wrap {
    margin-top: 1rem;
    display: none;
  }
  .progress-label { font-size: 0.82rem; color: #64748b; margin-bottom: 0.5rem; }
  #progress-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .progress-row-header {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; color: #64748b; margin-bottom: 0.25rem;
  }
  .progress-row-pct { color: #94a3b8; font-variant-numeric: tabular-nums; }
  .progress-bar-bg {
    background: #2d3348; border-radius: 4px; height: 6px; overflow: hidden;
  }
  .progress-bar { height: 100%; background: #3b82f6; width: 0%; transition: width 0.2s; border-radius: 4px; }

  #status {
    margin-top: 0.75rem; font-size: 0.88rem; color: #64748b; min-height: 1.2em;
  }
  #status.error { color: #f87171; }
  #status.info  { color: #60a5fa; }

  .spinner {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid #3b82f680; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin .8s linear infinite;
    vertical-align: middle; margin-right: 0.35rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 640px) { .results-grid { grid-template-columns: 1fr; } }

  .result-box {
    display: flex; flex-direction: column;
  }
  .result-box h2 {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: .08em;
    color: #64748b; margin-bottom: 0.6rem; flex-shrink: 0;
  }
  .result-box pre {
    background: #0f1117; border: 1px solid #2d3348; border-radius: 8px;
    padding: 0.9rem; font-size: 0.82rem; line-height: 1.6;
    overflow-y: auto; white-space: pre-wrap;
    word-break: break-word; color: #cbd5e1; flex: 1;
  }
  #transcript-out {
    width: 100%; background: #0f1117; border: 1px solid #2d3348; border-radius: 8px;
    padding: 0.9rem; font-size: 0.82rem; line-height: 1.6;
    min-height: max(300px, 40vh); white-space: pre-wrap;
    word-break: break-word; color: #cbd5e1;
    font-family: inherit; resize: none; outline: none; flex: 1;
  }
  #transcript-out:focus { border-color: #3b82f6; }
  .protocol-content {
    background: #0f1117; border: 1px solid #2d3348; border-radius: 8px;
    padding: 0.9rem; font-size: 0.88rem; line-height: 1.7;
    overflow-y: auto; min-height: max(300px, 40vh); flex: 1;
  }
  .gen-counter {
    display: flex; align-items: center; gap: 0.6rem;
    color: #64748b; font-size: 0.88rem; padding: 0.25rem 0;
  }
  .protocol-content h3 {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: .07em;
    color: #60a5fa; margin: 0.9rem 0 0.4rem;
  }
  .protocol-content h3:first-child { margin-top: 0; }
  .protocol-content ul { padding-left: 1.1rem; color: #cbd5e1; }
  .protocol-content li { margin-bottom: .25rem; }
  .protocol-content p { color: #cbd5e1; }
  .protocol-content table { width: 100%; border-collapse: collapse; font-size: .82rem; color: #cbd5e1; }
  .protocol-content th {
    text-align: left; padding: .35rem .6rem; border-bottom: 1px solid #2d3348;
    color: #94a3b8; font-weight: 500;
  }
  .protocol-content td { padding: .35rem .6rem; border-bottom: 1px solid #1e2130; }


  .action-row { margin-top: 1rem; display: flex; justify-content: flex-end; align-items: center; gap: 0.5rem; }

  footer {
    max-width: 960px;
    margin: 0 auto 2rem;
    text-align: center;
    font-size: 0.78rem;
    color: #475569;
    line-height: 1.8;
  }
  footer a { color: #64748b; text-decoration: underline; }
  footer a:hover { color: #94a3b8; }
  #storage-info { margin-top: 0.4rem; }
  .btn-link {
    background: none; border: none; color: #64748b; cursor: pointer;
    font-size: 0.78rem; text-decoration: underline; padding: 0;
  }
  .btn-link:hover { color: #94a3b8; }
</style>
</head>
<body>

<header>
  <h1>Meetingprotokoll-Generator</h1>
</header>

<div class="card">
  <div class="meta-row">
    <input class="meta-input" type="text" id="meta-title" placeholder="Meeting-Titel (optional)">
    <input class="meta-input" type="date" id="meta-date">
    <input class="meta-input" type="text" id="meta-participants" placeholder="Teilnehmer (optional, kommagetrennt)">
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="upload">Datei hochladen</button>
    <button class="tab" data-tab="record">Live-Aufnahme</button>
  </div>

  <div class="tab-panel active" id="tab-upload">
    <label class="file-label" for="file-input">Audio- oder Videodatei auswählen…</label>
    <input type="file" id="file-input" accept="audio/*,video/*">
    <div id="file-name">Keine Datei ausgewählt</div>
    <button class="btn btn-primary" id="upload-btn" disabled>Transkribieren &amp; Zusammenfassen</button>
  </div>

  <div class="tab-panel" id="tab-record">
    <div class="record-row">
      <div class="dot" id="rec-dot"></div>
      <span id="record-timer"></span>
      <button class="btn btn-primary" id="record-btn">Aufnahme starten</button>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label" id="progress-label">Modell wird geladen…</div>
    <div id="progress-list"></div>
  </div>
  <div id="status"></div>
</div>

<div class="card" id="results">
  <div class="results-grid">
    <div class="result-box">
      <h2>Rohtranskript</h2>
      <textarea id="transcript-out" spellcheck="false"></textarea>
    </div>
    <div class="result-box">
      <h2>Meetingprotokoll</h2>
      <div class="protocol-content" id="protocol-out"></div>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-ghost" id="regen-btn" disabled>Protokoll neu erstellen</button>
    <button class="btn btn-ghost" id="download-btn" disabled>Herunterladen (.md)</button>
  </div>
</div>

<footer>
  Built with <a href="https://ai.google.dev/gemma" target="_blank" rel="noopener">Gemma 4</a> (Google DeepMind, Apache 2.0) &middot;
  Transcription by <a href="https://openai.com/research/whisper" target="_blank" rel="noopener">Whisper</a> (OpenAI, MIT) via
  <a href="https://github.com/huggingface/transformers.js" target="_blank" rel="noopener">Transformers.js</a> (Apache 2.0)
  <div id="storage-info"></div>
</footer>

<script type="module">
// ---------------------------------------------------------------------------
// Config — change model IDs here if needed
// ---------------------------------------------------------------------------
const WHISPER_MODEL = 'onnx-community/whisper-large-v3-turbo';

const SYSTEM_PROMPT = `Du bist ein erfahrener Meetingsekretär. Analysiere das Transkript und erstelle ein sachliches Protokoll auf Deutsch.

Gib NUR gültiges JSON zurück — keine Markdown-Blöcke, keine Erklärungen, kein zusätzlicher Text.

Regeln:
- "zusammenfassung": 3-5 Sätze — Zweck des Meetings, zentrale Diskussionspunkte, Ergebnis
- "hauptentscheidungen": Nur echte Beschlüsse oder klare Einigungen (keine bloßen Diskussionspunkte)
- "aufgaben": Nur konkrete Aufträge mit erkennbarem Verantwortlichen oder Termin; vage Absichten weglassen
- "hauptthemen": Die inhaltlichen Schwerpunkte als prägnante Stichpunkte
- Wenn Teilnehmer angegeben sind, weise Aufgaben ("verantwortlich") bevorzugt diesen Personen zu.

Schema (strikt einhalten):
{
  "zusammenfassung": "…",
  "hauptentscheidungen": ["Vollständiger Satz pro Beschluss"],
  "aufgaben": [{"aufgabe": "Konkreter Auftrag", "verantwortlich": "Name/Rolle oder null", "faellig": "Frist oder null"}],
  "hauptthemen": ["Stichpunkt"]
}

Leere Felder: leere Liste [] oder null.`;

// ---------------------------------------------------------------------------
// Whisper Web Worker source (runs inference off the main thread)
// ---------------------------------------------------------------------------
const WHISPER_WORKER_SRC = `
let pipeline, WhisperTextStreamer, env;
let asr = null;

self.addEventListener('message', async ({ data: msg }) => {
  if (msg.type === 'load') {
    try {
      const tfUrl = msg.localVendor
        ? msg.baseUrl + '/vendor/transformers.js'
        : 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/+esm';
      ({ pipeline, WhisperTextStreamer, env } = await import(tfUrl));
      if (msg.localVendor) {
        env.backends.onnx.wasm.wasmPaths = msg.baseUrl + '/vendor/ort/';
        env.remoteHost = msg.baseUrl + '/models';
      }
      asr = await pipeline('automatic-speech-recognition', msg.model, {
        device: 'webgpu',
        dtype: { encoder_model: 'fp16', decoder_model_merged: 'q4' },
        progress_callback: p => self.postMessage({ type: 'progress', data: p }),
      });
      self.postMessage({ type: 'ready' });
    } catch (e) { self.postMessage({ type: 'error', message: e.message }); }
    return;
  }

  if (msg.type === 'transcribe') {
    try {
      let accumulated = '';
      const streamer = new WhisperTextStreamer(asr.tokenizer, {
        skip_prompt: true,
        callback_function: text => {
          accumulated += text;
          self.postMessage({ type: 'partial', text: accumulated });
        },
        on_chunk_start: t => self.postMessage({ type: 'chunk', timestamp: t }),
      });

      const result = await asr(new Float32Array(msg.audio), {
        task: 'transcribe',
        language: 'german',
        return_timestamps: true,
        chunk_length_s: 30,
        stride_length_s: 5,
        num_beams: 1,
        no_repeat_ngram_size: 5,
        streamer,
      });
      self.postMessage({ type: 'complete', text: result.text ?? accumulated });
    } catch (e) { self.postMessage({ type: 'error', message: e.message }); }
  }
});
`;

// ---------------------------------------------------------------------------
// Browser compatibility check
// ---------------------------------------------------------------------------
const hasJSPI = typeof WebAssembly?.Suspending === 'function';
if (!hasJSPI) {
  document.getElementById('status').innerHTML =
    '<strong style="color:#f87171">Gemma 4 erfordert Chrome 123 oder neuer.</strong> ' +
    'Die Transkription (Whisper) funktioniert weiterhin, aber die Protokollerstellung ist in diesem Browser nicht verfügbar.';
  document.getElementById('status').className = 'error';
}

// ---------------------------------------------------------------------------
// Imports — HEAD probe picks local vendor (Docker) or CDN (dev) silently
// ---------------------------------------------------------------------------
const useLocalVendor = await fetch('/vendor/litert-lm.js', { method: 'HEAD' })
  .then(r => r.ok).catch(() => false);

const litrtLmUrl = useLocalVendor
  ? '/vendor/litert-lm.js'
  : 'https://cdn.jsdelivr.net/npm/@litert-lm/core/+esm';
const { Engine, loadLiteRtLm } = hasJSPI
  ? await import(litrtLmUrl)
  : {};

// Gemma model: local in Docker, HuggingFace CDN in dev mode
const GEMMA_MODEL = useLocalVendor
  ? '/models/gemma/gemma-4-E4B-it-web.litertlm'
  : 'https://huggingface.co/litert-community/gemma-4-E4B-it-litert-lm/resolve/main/gemma-4-E4B-it-web.litertlm';

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let asrWorker          = null;
let asrReady           = false;
let llmEngine          = null;
let modelObjectUrl     = null;
let litrtLmLoadPromise = null;
let lastData           = null;
let isBusy             = false;

// ---------------------------------------------------------------------------
// Tab switching
// ---------------------------------------------------------------------------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ---------------------------------------------------------------------------
// Upload tab
// ---------------------------------------------------------------------------
const fileInput  = document.getElementById('file-input');
const uploadBtn  = document.getElementById('upload-btn');
const fileNameEl = document.getElementById('file-name');

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  fileNameEl.textContent = f ? f.name : 'Keine Datei ausgewählt';
  uploadBtn.disabled = !f;
});

uploadBtn.addEventListener('click', () => {
  const f = fileInput.files[0];
  if (f) processBlob(f);
});

// ---------------------------------------------------------------------------
// Live record tab
// ---------------------------------------------------------------------------
const recordBtn  = document.getElementById('record-btn');
const recDot     = document.getElementById('rec-dot');
const timerEl    = document.getElementById('record-timer');

let mediaRecorder = null;
let recordChunks  = [];
let timerInterval = null;
let elapsed = 0;

recordBtn.addEventListener('click', async () => {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      setStatus('Mikrofonzugriff verweigert: ' + e.message, 'error'); return;
    }
    recordChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size) recordChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const mime = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(recordChunks, { type: mime });
      processBlob(blob);
    };
    mediaRecorder.start();
    elapsed = 0;
    timerEl.textContent = '0:00';
    recDot.classList.add('pulse');
    recordBtn.textContent = 'Stoppen & Transkribieren';
    recordBtn.classList.replace('btn-primary', 'btn-danger');
    timerInterval = setInterval(() => {
      elapsed++;
      const m = Math.floor(elapsed / 60), s = elapsed % 60;
      timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
    setStatus('Aufnahme läuft…', 'info');
  } else {
    clearInterval(timerInterval);
    recDot.classList.remove('pulse');
    timerEl.textContent = '';
    recordBtn.disabled = true;
    recordBtn.textContent = 'Aufnahme starten';
    recordBtn.classList.replace('btn-danger', 'btn-primary');
    mediaRecorder.stop();
  }
});

// ---------------------------------------------------------------------------
// Audio → Float32Array at 16 kHz (Whisper native rate)
// ---------------------------------------------------------------------------
async function blobToFloat32(blob) {
  const arrayBuffer = await blob.arrayBuffer();
  const audioCtx    = new AudioContext();
  const decoded     = await audioCtx.decodeAudioData(arrayBuffer);
  audioCtx.close();

  const TARGET_SR = 16000;
  const offlineCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration * TARGET_SR), TARGET_SR);
  const source     = offlineCtx.createBufferSource();
  source.buffer    = decoded;
  source.connect(offlineCtx.destination);
  source.start();
  const resampled = await offlineCtx.startRendering();
  return resampled.getChannelData(0);
}

// ---------------------------------------------------------------------------
// OPFS-backed download with progress (used for large Gemma model files)
// Falls back to direct URL if OPFS is unavailable.
// ---------------------------------------------------------------------------
async function fetchWithOPFSCache(url, onProgress) {
  const filename = url.split('/').pop();
  try {
    const root = await navigator.storage.getDirectory();
    const dir  = await root.getDirectoryHandle('gemma-cache', { create: true });

    // A sibling .done marker file means the previous download completed fully.
    try {
      await dir.getFileHandle(filename + '.done');
      const file = await (await dir.getFileHandle(filename)).getFile();
      onProgress(100);
      return URL.createObjectURL(file);
    } catch { /* not cached or incomplete — fall through to download */ }

    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const total    = +res.headers.get('Content-Length') || 0;
    const reader   = res.body.getReader();
    const writable = await (await dir.getFileHandle(filename, { create: true })).createWritable();
    let received = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      await writable.write(value);
      received += value.length;
      if (total) onProgress(received / total * 100);
    }
    await writable.close();

    // Mark as complete so the next load skips re-downloading.
    await (await dir.getFileHandle(filename + '.done', { create: true })).createWritable().then(w => w.close());

    // Request persistent storage so Chrome doesn't evict the downloaded model.
    navigator.storage.persist().catch(() => {});

    const file = await (await dir.getFileHandle(filename)).getFile();
    return URL.createObjectURL(file);
  } catch (e) {
    console.warn('OPFS cache unavailable, using direct URL:', e.message);
    return url;
  }
}

// ---------------------------------------------------------------------------
// ASR worker helpers
// ---------------------------------------------------------------------------
function getAsrWorker() {
  if (!asrWorker) {
    const blob = new Blob([WHISPER_WORKER_SRC], { type: 'text/javascript' });
    asrWorker = new Worker(URL.createObjectURL(blob), { type: 'module' });
  }
  return asrWorker;
}

// Effective step = chunk_length_s (30) − 2 × stride_length_s (5) = 20 s
const WHISPER_WINDOW_STEP_S = 20;
const fmtTime = s => Math.floor(s / 60) + ':' + Math.floor(s % 60).toString().padStart(2, '0');

function workerRun(type, payload, transfer = []) {
  return new Promise((resolve, reject) => {
    const w = getAsrWorker();
    // Pull totalDuration out so the worker doesn't see it; track running offset locally.
    const { totalDuration, ...workerPayload } = payload;
    let windowOffsetS = 0;
    let lastChunkTs   = -Infinity;

    const handler = ({ data }) => {
      switch (data.type) {
        case 'progress':
          updateProgress(data.data.progress ?? 0, data.data.file ?? '', data.data.status);
          break;
        case 'partial': {
          const out = document.getElementById('transcript-out');
          out.value = data.text;
          out.scrollTop = out.scrollHeight;
          document.getElementById('results').style.display = 'block';
          break;
        }
        case 'chunk':
          // Streamer timestamps are relative to the current 30 s window.
          // A significant backward jump signals a new audio window: bump the offset.
          if (Number.isFinite(data.timestamp)) {
            if (data.timestamp + 1 < lastChunkTs) windowOffsetS += WHISPER_WINDOW_STEP_S;
            lastChunkTs = data.timestamp;
            const cur = totalDuration
              ? Math.min(windowOffsetS + data.timestamp, totalDuration)
              : windowOffsetS + data.timestamp;
            const label = totalDuration
              ? 'Transkription ' + fmtTime(cur) + ' / ' + fmtTime(totalDuration)
              : 'Transkription bei ' + fmtTime(cur);
            setStatus('<span class="spinner"></span>' + label + '…', 'info');
          }
          break;
        case 'ready':
        case 'complete':
          w.removeEventListener('message', handler);
          resolve(data);
          break;
        case 'error':
          w.removeEventListener('message', handler);
          reject(new Error(data.message));
          break;
      }
    };
    w.addEventListener('message', handler);
    w.postMessage({ type, ...workerPayload }, transfer);
  });
}

// ---------------------------------------------------------------------------
// Transcript post-processing
// ---------------------------------------------------------------------------
function cleanTranscript(text) {
  // Strip German filler words (äh, ähm, äm, hm)
  let t = text.replace(/\b(äh+m?|äm+|eh+m?|hm+)\b[\s,]*/gi, '');
  t = t.replace(/[ \t]{2,}/g, ' ').trim();

  // Word-level sliding window dedup: if a run of 6+ consecutive words already
  // appeared in the preceding 100 words, skip it. Catches Whisper repetition
  // loops regardless of sentence boundaries.
  const words = t.split(/\s+/);
  const MIN_LEN = 6;
  const WINDOW  = 100;
  const out = [];
  let i = 0;
  while (i < words.length) {
    const hay = out.slice(Math.max(0, out.length - WINDOW)).map(w => w.toLowerCase()).join(' ');
    let skipped = false;
    for (let len = Math.min(40, words.length - i); len >= MIN_LEN; len--) {
      const needle = words.slice(i, i + len).map(w => w.toLowerCase()).join(' ');
      if (hay.includes(needle)) {
        i += len;
        skipped = true;
        break;
      }
    }
    if (!skipped) out.push(words[i++]);
  }
  return out.join(' ');
}

// ---------------------------------------------------------------------------
// Meeting metadata helpers
// ---------------------------------------------------------------------------
function getMeta() {
  return {
    title:        document.getElementById('meta-title').value.trim(),
    date:         document.getElementById('meta-date').value,
    participants: document.getElementById('meta-participants').value.trim(),
  };
}

function buildUserMessage(transcript, meta = {}, isCondensed = false) {
  const lines = [];
  if (meta.title)        lines.push(`Meeting: ${meta.title}`);
  if (meta.date)         lines.push(`Datum: ${meta.date}`);
  if (meta.participants) lines.push(`Teilnehmer: ${meta.participants}`);
  if (lines.length)      lines.push('');
  if (isCondensed) {
    lines.push('Hinweis: Das Transkript wurde wegen seiner Länge abschnittsweise kondensiert.');
    lines.push('');
  }
  lines.push('Meetingtranskript:', '', transcript);
  return lines.join('\n');
}

function splitAtSentences(text, maxChars) {
  const chunks = [];
  let start = 0;
  while (start < text.length) {
    if (start + maxChars >= text.length) {
      chunks.push(text.slice(start).trim());
      break;
    }
    const win  = text.slice(start, start + maxChars);
    const last = Math.max(win.lastIndexOf('. '), win.lastIndexOf('! '), win.lastIndexOf('? '));
    const cut  = last > 0 ? last + 1 : maxChars;
    chunks.push(text.slice(start, start + cut).trim());
    start += cut;
    while (start < text.length && text[start] === ' ') start++;
  }
  return chunks.filter(c => c.length > 0);
}

function slugify(s) {
  return s.toLowerCase()
    .replace(/[äÄ]/g, 'ae').replace(/[öÖ]/g, 'oe').replace(/[üÜ]/g, 'ue').replace(/ß/g, 'ss')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

// ---------------------------------------------------------------------------
// LLM single-turn streaming helper (creates a fresh conversation each call)
// ---------------------------------------------------------------------------
async function streamConversation(systemPrompt, userMessage, showCounter = false) {
  const conv = await llmEngine.createConversation({
    preface: { messages: [{ role: 'system', content: systemPrompt }] },
    sessionConfig: { samplerParams: { temperature: 0.3, k: 40, p: 0.9 } },
  });
  let buffer = '';
  let charCount = 0;
  for await (const chunk of conv.sendMessageStreaming(userMessage)) {
    for (const item of chunk.content) {
      if (item.type === 'text') {
        buffer += item.text;
        if (showCounter) {
          charCount += item.text.length;
          const el = document.getElementById('token-count');
          if (el) el.textContent = charCount;
        }
      }
    }
  }
  await conv.delete();
  return buffer;
}

// ---------------------------------------------------------------------------
// LLM protocol generation (can be called standalone from the regen button)
// ---------------------------------------------------------------------------
async function generateProtocol(transcript, meta = {}) {
  document.getElementById('regen-btn').disabled = true;
  setStatus('<span class="spinner"></span>Gemma 4 E4B wird geladen…', 'info');

  if (!Engine) {
    throw new Error('Protokollerstellung erfordert Chrome 123+. Die Transkription war erfolgreich — siehe Rohtranskript oben.');
  }

  if (!llmEngine) {
    if (useLocalVendor && loadLiteRtLm && !litrtLmLoadPromise) {
      litrtLmLoadPromise = loadLiteRtLm('/vendor/litert-lm-wasm/');
    }
    if (litrtLmLoadPromise) await litrtLmLoadPromise;

    showProgress('Gemma 4 E4B-Modell wird geladen…');
    const modelSrc = await fetchWithOPFSCache(
      GEMMA_MODEL,
      pct => updateProgress(pct, GEMMA_MODEL.split('/').pop()),
    );
    llmEngine = await Engine.create({
      model: modelSrc,
      mainExecutorSettings: { maxNumTokens: 16384 },
    });
    if (modelSrc.startsWith('blob:')) modelObjectUrl = modelSrc;
    hideProgress();
  }

  // Map-reduce for long transcripts that would exceed the context window
  const PROMPT_OVERHEAD  = 1000;
  const MAX_TOKENS       = 15000;
  const CHUNK_TOKENS     = 8000;
  const SUMMARY_PROMPT   = 'Fasse diesen Transkriptabschnitt sachlich zusammen. Erhalte alle Entscheidungen, Aufgaben (mit Verantwortlichen und Fristen) und Themen. Antworte als Fließtext.';

  let inputTranscript = transcript;
  let isCondensed     = false;

  if ((transcript.length / 4) + PROMPT_OVERHEAD > MAX_TOKENS) {
    const chunks = splitAtSentences(transcript, CHUNK_TOKENS * 4);
    const summaries = [];
    for (let i = 0; i < chunks.length; i++) {
      setStatus(`<span class="spinner"></span>Abschnitt ${i + 1}/${chunks.length} wird zusammengefasst…`, 'info');
      summaries.push(await streamConversation(SUMMARY_PROMPT, chunks[i]));
    }
    inputTranscript = summaries.join('\n\n');
    isCondensed = true;
  }

  setStatus('<span class="spinner"></span>Protokoll wird erstellt…', 'info');
  const protocolEl = document.getElementById('protocol-out');
  const genCounter = () =>
    '<div class="gen-counter"><span class="spinner"></span>' +
    '<span>Generiere… <strong id="token-count">0</strong> Zeichen</span></div>';

  protocolEl.innerHTML = genCounter();
  const userMessage = buildUserMessage(inputTranscript, meta, isCondensed);
  let buffer = await streamConversation(SYSTEM_PROMPT, userMessage, true);
  let protocol = parseProtocol(buffer);

  // Retry once if the model returned non-JSON output
  if (protocol.raw_output !== undefined) {
    setStatus('<span class="spinner"></span>Antwort war kein gültiges JSON – zweiter Versuch…', 'info');
    protocolEl.innerHTML = genCounter();
    buffer = await streamConversation(
      SYSTEM_PROMPT,
      userMessage + '\n\nAntworte ausschließlich mit dem JSON-Objekt.',
      true,
    );
    protocol = parseProtocol(buffer);
  }

  lastData = { transcript, protocol, meta };
  saveSession(lastData);
  renderProtocol(protocol, meta);
  document.getElementById('download-btn').disabled = false;
  document.getElementById('regen-btn').disabled = false;
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  setStatus('Fertig.', '');
}

// ---------------------------------------------------------------------------
// Core processing pipeline
// ---------------------------------------------------------------------------
async function processBlob(blob) {
  setAllBusy(true);
  resetResults();

  try {
    setStatus('<span class="spinner"></span>Audio wird verarbeitet…', 'info');
    const audio = await blobToFloat32(blob);

    if (!asrReady) {
      showProgress('Whisper-Modell wird heruntergeladen…');
      await workerRun('load', { model: WHISPER_MODEL, baseUrl: window.location.origin, localVendor: useLocalVendor });
      asrReady = true;
      hideProgress();
    }

    const totalDuration = audio.length / 16000;
    setStatus('<span class="spinner"></span>Transkription läuft… (' + fmtTime(totalDuration) + ' insgesamt)', 'info');
    const asrResult = await workerRun(
      'transcribe',
      { audio: audio.buffer, totalDuration },
      [audio.buffer],
    );
    const transcript = cleanTranscript((asrResult.text ?? '').trim());
    const transcriptEl = document.getElementById('transcript-out');
    transcriptEl.value = transcript || '(leer)';
    document.getElementById('results').style.display = 'block';
    document.getElementById('regen-btn').disabled = false;

    await generateProtocol(transcript, getMeta());

  } catch (e) {
    setStatus('Fehler: ' + e.message, 'error');
    console.error(e);
  } finally {
    setAllBusy(false);
  }
}

// ---------------------------------------------------------------------------
// JSON parsing with fallback
// ---------------------------------------------------------------------------
function parseProtocol(raw) {
  const cleaned = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
  try { return JSON.parse(cleaned); } catch {}
  // Try to extract first { ... } block
  const m = cleaned.match(/\{[\s\S]*\}/);
  if (m) try { return JSON.parse(m[0]); } catch {}
  return {
    zusammenfassung: 'Protokoll konnte nicht aus der Modellausgabe geparst werden.',
    hauptentscheidungen: [], aufgaben: [], hauptthemen: [],
    raw_output: raw,
  };
}

// ---------------------------------------------------------------------------
// Render protocol HTML
// ---------------------------------------------------------------------------
function renderProtocol(p, meta = {}) {
  const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = '';

  if (meta.title || meta.date || meta.participants) {
    if (meta.title) html += `<h3 style="font-size:1rem;text-transform:none;letter-spacing:0;color:#f8fafc;margin-bottom:.2rem">${esc(meta.title)}</h3>`;
    const sub = [meta.date, meta.participants].filter(Boolean).map(esc).join(' · ');
    if (sub) html += `<p style="color:#64748b;font-size:.82rem;margin-bottom:.75rem">${sub}</p>`;
  }

  if (p.raw_output) {
    html += `<p style="color:#f87171;margin-bottom:.5rem">JSON konnte nicht geparst werden — Rohausgabe unten.</p>`;
    html += `<pre style="font-size:.78rem;color:#94a3b8;white-space:pre-wrap">${esc(p.raw_output)}</pre>`;
  } else {
    html += '<h3>Zusammenfassung</h3><p>' + esc(p.zusammenfassung || '—') + '</p>';

    if ((p.hauptentscheidungen || []).length) {
      html += '<h3>Hauptentscheidungen</h3><ul>';
      p.hauptentscheidungen.forEach(d => { html += `<li>${esc(d)}</li>`; });
      html += '</ul>';
    }
    if ((p.aufgaben || []).length) {
      html += '<h3>Aufgaben</h3><table><thead><tr><th>Aufgabe</th><th>Verantwortlich</th><th>Fällig</th></tr></thead><tbody>';
      p.aufgaben.forEach(a => {
        html += `<tr><td>${esc(a.aufgabe)}</td><td>${esc(a.verantwortlich??'—')}</td><td>${esc(a.faellig??'—')}</td></tr>`;
      });
      html += '</tbody></table>';
    }
    if ((p.hauptthemen || []).length) {
      html += '<h3>Hauptthemen</h3><ul>';
      p.hauptthemen.forEach(t => { html += `<li>${esc(t)}</li>`; });
      html += '</ul>';
    }
  }
  document.getElementById('protocol-out').innerHTML = html;
}

// ---------------------------------------------------------------------------
// Markdown download
// ---------------------------------------------------------------------------
document.getElementById('download-btn').addEventListener('click', () => {
  if (!lastData) return;
  const { transcript, protocol: p, meta = {} } = lastData;
  const date  = meta.date  || new Date().toISOString().slice(0, 10);
  const title = meta.title || 'Meetingprotokoll';

  let md = `# ${title}\n_Datum: ${date}`;
  if (meta.participants) md += ` · Teilnehmer: ${meta.participants}`;
  md += `_\n\n`;

  md += `## Zusammenfassung\n${p.zusammenfassung || '—'}\n\n`;
  if ((p.hauptentscheidungen || []).length) {
    md += `## Hauptentscheidungen\n` + p.hauptentscheidungen.map(d => `- ${d}`).join('\n') + '\n\n';
  }
  if ((p.aufgaben || []).length) {
    md += `## Aufgaben\n| Aufgabe | Verantwortlich | Fällig |\n|---------|----------------|--------|\n`;
    p.aufgaben.forEach(a => { md += `| ${a.aufgabe||''} | ${a.verantwortlich||'—'} | ${a.faellig||'—'} |\n`; });
    md += '\n';
  }
  if ((p.hauptthemen || []).length) {
    md += `## Hauptthemen\n` + p.hauptthemen.map(t => `- ${t}`).join('\n') + '\n\n';
  }
  md += `---\n## Rohtranskript\n${transcript}\n`;

  const blob     = new Blob([md], { type: 'text/markdown' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  a.href         = url;
  const prefix   = meta.title ? slugify(meta.title) : 'protokoll';
  a.download     = `${prefix}_${date}.md`;
  a.click();
  URL.revokeObjectURL(url);
});

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setStatus(html, type) {
  const el = document.getElementById('status');
  el.innerHTML = html;
  el.className = type || '';
}

const _progressRows = new Map(); // file key → { bar, pctEl }

function showProgress(label) {
  document.getElementById('progress-label').textContent = label;
  document.getElementById('progress-list').innerHTML = '';
  _progressRows.clear();
  document.getElementById('progress-wrap').style.display = 'block';
}

function updateProgress(pct, file, status) {
  if (status === 'done') pct = 100;
  const pctClamped = Math.min(Math.max(pct ?? 0, 0), 100);
  const key = file || '__default__';
  const list = document.getElementById('progress-list');

  let entry = _progressRows.get(key);
  if (!entry) {
    const displayName = file.includes('/') ? file.split('/').pop() : file;
    const row = document.createElement('div');
    row.innerHTML =
      `<div class="progress-row-header"><span>${displayName}</span><span class="progress-row-pct">0%</span></div>` +
      `<div class="progress-bar-bg"><div class="progress-bar" style="width:0%"></div></div>`;
    list.appendChild(row);
    entry = { bar: row.querySelector('.progress-bar'), pctEl: row.querySelector('.progress-row-pct') };
    _progressRows.set(key, entry);
  }

  entry.bar.style.width = pctClamped + '%';
  entry.pctEl.textContent = Math.round(pctClamped) + '%';
}

function hideProgress() {
  document.getElementById('progress-wrap').style.display = 'none';
}

function resetResults() {
  document.getElementById('transcript-out').value = '';
  document.getElementById('regen-btn').disabled = true;
  document.getElementById('download-btn').disabled = true;
  document.getElementById('protocol-out').innerHTML = '';
  lastData = null;
}

document.getElementById('regen-btn').addEventListener('click', async () => {
  const transcript = document.getElementById('transcript-out').value.trim();
  if (!transcript) return;
  setAllBusy(true);
  try {
    await generateProtocol(transcript, getMeta());
  } catch (e) {
    setStatus('Fehler: ' + e.message, 'error');
    console.error(e);
  } finally {
    setAllBusy(false);
  }
});

function setAllBusy(busy) {
  isBusy = busy;
  uploadBtn.disabled  = busy || !fileInput.files[0];
  recordBtn.disabled  = busy;
  const regenBtn = document.getElementById('regen-btn');
  if (busy) regenBtn.disabled = true;
  else if (document.getElementById('transcript-out').value) regenBtn.disabled = false;
  const downloadBtn = document.getElementById('download-btn');
  if (busy) downloadBtn.disabled = true;
  else if (lastData) downloadBtn.disabled = false;
}

document.getElementById('meta-date').value = new Date().toISOString().slice(0, 10);

// ---------------------------------------------------------------------------
// 3.1 Storage management
// ---------------------------------------------------------------------------
function fmtBytes(bytes) {
  if (bytes >= 1e9) return (bytes / 1e9).toFixed(1).replace('.', ',') + ' GB';
  if (bytes >= 1e6) return Math.round(bytes / 1e6) + ' MB';
  return Math.round(bytes / 1e3) + ' KB';
}

async function refreshStorageInfo() {
  const el = document.getElementById('storage-info');
  if (!el) return;
  try {
    const { usage } = await navigator.storage.estimate();
    el.innerHTML =
      `Lokale Modelle: ${fmtBytes(usage ?? 0)} belegt · ` +
      `<button class="btn-link" id="delete-models-btn">Modelle löschen</button>`;
    document.getElementById('delete-models-btn').addEventListener('click', deleteModels);
  } catch {
    el.textContent = '';
  }
}

async function deleteModels() {
  try {
    const root = await navigator.storage.getDirectory();
    await root.removeEntry('gemma-cache', { recursive: true });
  } catch { /* already gone */ }
  const keys = await caches.keys();
  await Promise.all(keys.filter(k => k.toLowerCase().includes('transformers')).map(k => caches.delete(k)));
  llmEngine = null; // engine held a blob URL that no longer exists
  await refreshStorageInfo();
}

// ---------------------------------------------------------------------------
// 3.3 Session persistence + unload guard
// ---------------------------------------------------------------------------
const SESSION_KEY = 'meetingprotokoll_session';

function saveSession(data) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ ...data, timestamp: new Date().toISOString() }));
  } catch { /* quota exceeded — silently skip */ }
}

function checkSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved.transcript || !saved.protocol) return;
    const time = new Date(saved.timestamp).toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'short' });
    const el = document.getElementById('status');
    el.className = 'info';
    el.innerHTML =
      `Letzte Sitzung vom ${time} wiederherstellen? ` +
      `<button class="btn btn-ghost" style="padding:.2rem .75rem;font-size:.8rem;margin:0 .25rem" id="restore-btn">Wiederherstellen</button>` +
      `<button class="btn btn-ghost" style="padding:.2rem .75rem;font-size:.8rem" id="dismiss-session-btn">Verwerfen</button>`;
    document.getElementById('restore-btn').addEventListener('click', () => restoreSession(saved));
    document.getElementById('dismiss-session-btn').addEventListener('click', () => {
      localStorage.removeItem(SESSION_KEY);
      el.innerHTML = '';
      el.className = '';
    });
  } catch { /* corrupted storage — ignore */ }
}

function restoreSession(saved) {
  lastData = { transcript: saved.transcript, protocol: saved.protocol, meta: saved.meta ?? {} };
  const { transcript, protocol, meta } = lastData;

  if (meta.title)        document.getElementById('meta-title').value = meta.title;
  if (meta.date)         document.getElementById('meta-date').value  = meta.date;
  if (meta.participants) document.getElementById('meta-participants').value = meta.participants;

  document.getElementById('transcript-out').value = transcript;
  renderProtocol(protocol, meta);

  document.getElementById('results').style.display = 'block';
  document.getElementById('regen-btn').disabled    = false;
  document.getElementById('download-btn').disabled = false;

  setStatus('', '');
}

window.addEventListener('beforeunload', e => {
  if (isBusy) { e.preventDefault(); e.returnValue = ''; }
});

// Initialise storage info and session restore offer
refreshStorageInfo();
checkSavedSession();
</script>
